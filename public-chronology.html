<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMT System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        /* ------------------------------------------------------------- */
        /*  your existing styles – kept exactly as they were            */
        /* ------------------------------------------------------------- */
        :root {
            --primary: #4a6fa5;
            --secondary: #6c9bcf;
            --accent: #7ba7d9;
            --success: #6cceb6;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --card-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            --ongoing: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a8c0ff 0%, #3f4c6b 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 8s ease-in-out infinite;
        }

        .circle-1 {
            width: 100px;
            height: 100px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 150px;
            height: 150px;
            top: 65%;
            right: 8%;
            animation-delay: 2s;
        }

        .circle-3 {
            width: 80px;
            height: 80px;
            bottom: 25%;
            left: 15%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-25px) rotate(180deg);
                opacity: 0.3;
            }
        }

        .top-nav {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-brand {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            background-clip: padding-box;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: left 0.3s ease;
            z-index: -1;
            background-clip: padding-box;
        }

        .nav-links a.active {
            color: white;
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.3);
        }

        .nav-links a.active::before {
            left: 0;
        }

        .nav-links a:hover:not(.active) {
            background-color: rgba(74, 111, 165, 0.1);
            transform: translateY(-2px);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(74, 111, 165, 0.4);
        }

        .main-content {
            padding: 40px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out;
        }

        .page-title {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .incident-header-badge {
            font-size: 1.4rem;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-weight: 500;
            white-space: nowrap;
            text-shadow: none;
        }

        .date-display-main {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
            margin-top: 10px;
            background: white;
            padding: 10px 25px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(74, 111, 165, 0.2);
        }

        .date-filter-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .date-filter-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.2);
        }

        .date-filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.3);
        }

        .date-filter-btn.active {
            background: linear-gradient(135deg, var(--success), #4CAF50);
        }

        .date-filter-btn.today-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .date-filter-btn.all-data-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-section {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 35px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideInUp 0.8s ease-out;
            background-clip: padding-box;
            border-left: 5px solid var(--accent);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .table-section .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
            margin: 0;
            font-size: 1.8rem;
        }

        .section-title i {
            color: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--primary);
        }

        .table-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .record-count {
            font-size: 0.85rem;
            color: var(--gray);
            background: var(--light);
            padding: 8px 15px;
            border-radius: 25px;
            border: 1px solid var(--light-gray);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 12px 20px 12px 45px;
            border: 2px solid var(--light-gray);
            border-radius: 25px;
            font-size: 1rem;
            width: 250px;
            transition: all 0.3s ease;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .search-box input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.2);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .sort-select {
            padding: 12px 20px;
            border: 2px solid var(--light-gray);
            border-radius: 25px;
            font-size: 1rem;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            min-width: 220px;
        }

        .sort-select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.2);
            transform: translateY(-2px);
        }

        .table-container-scroll {
            background: white;
            border-radius: 15px;
            border: 1px solid rgba(74, 111, 165, 0.1);
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .table-scroll-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            max-height: 100%;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            min-width: 900px; /* slightly wider for new columns */
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th {
            padding: 14px 15px;
            text-align: left;
            font-weight: 600;
            color: white;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .data-table th:hover {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(74, 111, 165, 0.1);
            vertical-align: top;
            font-size: 0.92rem;
            color: var(--dark);
            line-height: 1.4;
        }

        .data-table tbody tr.highlighted {
            background: rgba(255, 243, 205, 0.7) !important;
            border-left: 4px solid #f39c12;
        }

        .data-table tbody tr {
            transition: all 0.3s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(74, 111, 165, 0.05);
        }

        .data-table tbody tr:nth-child(even) {
            background-color: rgba(74, 111, 165, 0.02);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .timestamp-cell {
            min-width: 170px;
            vertical-align: top;
        }

        .timestamp-main {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 3px;
            font-size: 0.93rem;
        }

        .timestamp-time {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .incident-source {
            font-size: 0.82rem;
            color: #3498db;
            margin-top: 4px;
            font-style: italic;
        }

        .selected-tag {
            font-size: 0.75rem;
            color: #f39c12;
            font-weight: bold;
            margin-top: 2px;
            background: rgba(243, 156, 18, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .info-cell {
            color: var(--dark);
            line-height: 1.4;
            font-size: 0.92rem;
            vertical-align: top;
            padding-top: 12px;
        }

        .pear-cell {
            vertical-align: top;
            padding-top: 12px;
        }

        .pear-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 3px;
            color: white;
            text-transform: uppercase;
        }

        .badge-people { background: #e67e22; }
        .badge-environment { background: #27ae60; }
        .badge-asset { background: #3498db; }
        .badge-reputation { background: #9b59b6; }

        .status-circle {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            background-color: var(--ongoing);
            box-shadow: 0 0 8px var(--ongoing);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .pic-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(74, 111, 165, 0.3);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
            font-style: italic;
            font-size: 1.1rem;
        }

        .no-data i {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
            color: var(--primary);
        }

        .no-data.error {
            color: #e74c3c;
        }

        .no-data.error i {
            color: #e74c3c;
        }

        .refresh-btn {
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(74, 111, 165, 0.4);
        }

        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .table-scroll-wrapper::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        .table-scroll-wrapper::-webkit-scrollbar-track {
            background: rgba(74, 111, 165, 0.1);
            border-radius: 10px;
        }
        
        .table-scroll-wrapper::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }
        
        .table-scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
        }

        @media (max-width: 1024px) {
            .table-controls {
                flex-wrap: wrap;
                gap: 15px;
            }
            
            .search-box input {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .table-section {
                padding: 25px;
                height: 550px;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .table-controls {
                width: 100%;
                justify-content: space-between;
                flex-wrap: nowrap;
            }
            
            .search-box input {
                width: 100%;
                min-width: 150px;
            }
            
            .sort-select {
                min-width: 150px;
            }
            
            .table-scroll-wrapper {
                max-height: 400px;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 20px 15px;
            }
            
            .table-section {
                padding: 20px;
                border-radius: 15px;
                height: 500px;
            }
            
            .page-title {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .table-controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .search-box input,
            .sort-select {
                width: 100%;
                min-width: 100%;
            }
            
            .data-table {
                min-width: 700px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="floating-circle circle-1"></div>
        <div class="floating-circle circle-2"></div>
        <div class="floating-circle circle-3"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">EMT System</div>
        <ul class="nav-links">
            <li><a href="dashboard-public.html">Dashboard</a></li>
            <li><a href="public-info.html">Incidents</a></li>
            <li><a href="public-chronology.html" class="active">Chronology</a></li>
            <li><a href="public-ip.html">IP Status</a></li>
            <li><a href="public-pear.html">PEAR</a></li>
        </ul>
        <div class="user-section">
            <button class="home-btn" onclick="goToHome()">
                <i class="fas fa-home"></i> Home
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <div>
                <!-- page-title dynamically updated -->
                <h1 class="page-title" id="mainPageTitle">Chronology Records</h1>
                <div class="date-filter-controls">
                    <button id="allDataBtn" class="date-filter-btn all-data-btn" onclick="showAllData()">
                        <i class="fas fa-globe"></i> All Data
                    </button>
                    <button id="todayBtn" class="date-filter-btn today-btn" onclick="showTodayData()">
                        <i class="fas fa-calendar-day"></i> Today's Data
                    </button>
                    <button id="specificDateBtn" class="date-filter-btn" onclick="showSpecificDateData()" style="display: none;">
                        <i class="fas fa-calendar-alt"></i> Showing: <span id="specificDateDisplay"></span>
                    </button>
                </div>
            </div>
            <div id="currentDateDisplay" class="date-display-main">All Chronology Records</div>
        </div>

        <!-- Chronology Table Section -->
        <div class="table-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-history"></i> Event Chronology
                </h2>
                <div class="table-controls">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Search records...">
                    </div>
                    <select class="sort-select" id="sortSelect">
                        <option value="timestamp_desc">Newest First</option>
                        <option value="timestamp_asc">Oldest First</option>
                        <option value="incident_asc">By Incident (oldest first)</option>
                        <option value="incident_desc">By Incident (newest first)</option>
                        <option value="pic_asc">By PIC (A-Z)</option>
                        <option value="pic_desc">By PIC (Z-A)</option>
                    </select>
                    <span class="record-count" id="chronologyRecordCount">0 records</span>
                    <button class="refresh-btn" onclick="refreshChronology()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="table-container-scroll">
                <div class="table-scroll-wrapper">
                    <table class="data-table chronology-table">
                        <thead>
                            <tr>
                                <th width="18%">Timestamp</th>
                                <th width="40%">Information</th>
                                <th width="22%">PEAR Categories</th>
                                <th width="20%">PIC</th>
                            </tr>
                        </thead>
                        <tbody id="chronologyTableBody">
                            <tr>
                                <td colspan="4" class="no-data">
                                    <i class="fas fa-spinner fa-spin"></i> Loading chronology records...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAL5PhLd1pLhppxnZBoZnZWvmsyUQnttOQ",
            authDomain: "emt02-782e1.firebaseapp.com",
            projectId: "emt02-782e1",
            storageBucket: "emt02-782e1.firebasestorage.app",
            messagingSenderId: "791132862958",
            appId: "1:791132862958:web:8630b126f789c772ed76ff",
            measurementId: "G-BRXT4D79SL"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global variables
        let allChronologyData = [];
        let filteredData = [];
        let selectedDate = null;
        let selectedIncidentId = null;
        let isShowingSpecificDate = false;
        let viewMode = 'all'; // 'all', 'today', or 'specific'

        // incident id -> name map
        let incidentsMap = {};

        // Format date to YYYY-MM-DD
        function formatDateToYMD(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Format date for display (e.g., "11 Jan 2025")
        function formatDateDisplay(date) {
            return date.toLocaleDateString('en-GB', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            }).replace(',', '');
        }

        // Format timestamp for display
        function formatTimestampDisplay(timestamp) {
            if (!timestamp) return { date: 'N/A', time: 'N/A', dateYMD: 'N/A' };
            
            try {
                const date = timestamp.toDate();
                const dateYMD = formatDateToYMD(date);
                
                return {
                    date: formatDateDisplay(date),
                    time: date.toLocaleTimeString('en-GB', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    }),
                    timestamp: date.getTime(),
                    dateYMD: dateYMD,
                    fullDate: date
                };
            } catch (error) {
                console.warn('Error formatting timestamp:', error);
                return { date: 'N/A', time: 'N/A', timestamp: 0, dateYMD: 'N/A', fullDate: null };
            }
        }

        // Get URL parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                date: params.get('date'),
                incidentId: params.get('incidentId')
            };
        }

        // Check for specific date from URL or localStorage
        function checkForSpecificDate() {
            const urlParams = getUrlParams();
            const today = new Date();
            const todayYMD = formatDateToYMD(today);
            
            if (urlParams.date && urlParams.date !== 'null' && urlParams.date !== 'undefined') {
                selectedDate = urlParams.date;
                selectedIncidentId = urlParams.incidentId;
                isShowingSpecificDate = true;
                viewMode = 'specific';
                
                localStorage.setItem('selectedDate', selectedDate);
                localStorage.setItem('selectedIncidentId', selectedIncidentId);
            } else {
                const storedDate = localStorage.getItem('selectedDate');
                const storedIncidentId = localStorage.getItem('selectedIncidentId');
                
                if (storedDate && storedDate !== 'null' && storedDate !== 'undefined') {
                    selectedDate = storedDate;
                    selectedIncidentId = storedIncidentId;
                    isShowingSpecificDate = true;
                    viewMode = 'specific';
                } else {
                    selectedDate = null;
                    selectedIncidentId = null;
                    isShowingSpecificDate = false;
                    viewMode = 'all';
                }
            }
            
            return isShowingSpecificDate;
        }

        // Update UI based on date mode – now with clean header for selected incident
        function updateDateDisplay() {
            const allDataBtn = document.getElementById('allDataBtn');
            const todayBtn = document.getElementById('todayBtn');
            const specificDateBtn = document.getElementById('specificDateBtn');
            const specificDateDisplay = document.getElementById('specificDateDisplay');
            const currentDateDisplay = document.getElementById('currentDateDisplay');
            const pageTitleEl = document.getElementById('mainPageTitle');
            
            // Reset all buttons
            allDataBtn.classList.remove('active');
            todayBtn.classList.remove('active');
            specificDateBtn.classList.remove('active');
            
            if (viewMode === 'all') {
                allDataBtn.classList.add('active');
                todayBtn.style.display = 'flex';
                specificDateBtn.style.display = 'none';
                currentDateDisplay.textContent = 'All Chronology Records';
                pageTitleEl.innerHTML = 'Chronology Records';
                
            } else if (viewMode === 'today') {
                const today = new Date();
                const displayDate = formatDateDisplay(today);
                
                todayBtn.classList.add('active');
                todayBtn.style.display = 'flex';
                specificDateBtn.style.display = 'none';
                currentDateDisplay.textContent = `Today: ${displayDate}`;
                pageTitleEl.innerHTML = 'Chronology Records · Today';
                
            } else if (viewMode === 'specific' && selectedDate) {
                const dateObj = new Date(selectedDate);
                const displayDate = formatDateDisplay(dateObj);
                
                specificDateBtn.style.display = 'flex';
                specificDateBtn.classList.add('active');
                specificDateDisplay.textContent = displayDate;
                
                // Show incident name in header if a specific incident is selected – clean format
                if (selectedIncidentId) {
                    const incidentName = incidentsMap[selectedIncidentId] || 'Selected Incident';
                    pageTitleEl.innerHTML = `Chronology Records – ${incidentName}`;
                    currentDateDisplay.textContent = displayDate;
                } else {
                    pageTitleEl.innerHTML = 'Chronology Records';
                    currentDateDisplay.textContent = displayDate;
                }
            }
        }

        // Load all chronology data from all incidents + build incidentsMap
        async function loadAllChronologyData() {
            try {
                console.log('Loading all chronology data...');
                
                const incidentsSnapshot = await db.collection('incidents').get();
                const incidents = [];
                
                incidentsSnapshot.forEach((doc) => {
                    const incident = doc.data();
                    incident.id = doc.id;
                    incidents.push(incident);
                    incidentsMap[doc.id] = incident.name || 'Unnamed Incident';
                });
                
                const allChronologyPromises = incidents.map(async (incident) => {
                    try {
                        const chronologyRef = db.collection('incidents').doc(incident.id).collection('chronology');
                        const snapshot = await chronologyRef.orderBy('timestamp', 'desc').get();
                        
                        const chronologyList = [];
                        snapshot.forEach((doc) => {
                            const chronology = doc.data();
                            chronology.id = doc.id;
                            chronology.incidentId = incident.id;
                            chronology.incidentName = incident.name || 'Unnamed Incident';
                            
                            const timeInfo = formatTimestampDisplay(chronology.timestamp);
                            chronology.formattedDate = timeInfo.date;
                            chronology.formattedTime = timeInfo.time;
                            chronology.timestampValue = timeInfo.timestamp;
                            chronology.dateYMD = timeInfo.dateYMD;
                            chronology.fullDate = timeInfo.fullDate;
                            
                            chronologyList.push(chronology);
                        });
                        
                        return chronologyList;
                    } catch (error) {
                        console.error(`Error loading chronology for incident ${incident.id}:`, error);
                        return [];
                    }
                });
                
                const allChronologyResults = await Promise.all(allChronologyPromises);
                
                allChronologyData = [];
                allChronologyResults.forEach(chronologyList => {
                    allChronologyData.push(...chronologyList);
                });
                
                // default sort: newest first
                allChronologyData.sort((a, b) => (b.timestampValue || 0) - (a.timestampValue || 0));
                
                filterDataByViewMode();
                
                setTimeout(scrollToSelectedIncident, 1000);
                
                return true;
                
            } catch (error) {
                console.error('Error loading chronology data:', error);
                showNoDataError();
                return false;
            }
        }

        // Filter data based on view mode
        function filterDataByViewMode() {
            if (viewMode === 'all') {
                filteredData = [...allChronologyData];
                applySorting('timestamp_desc');
                document.getElementById('sortSelect').value = 'timestamp_desc';
                
            } else if (viewMode === 'today') {
                const todayYMD = formatDateToYMD(new Date());
                filteredData = allChronologyData.filter(data => data.dateYMD === todayYMD);
                // TODAY: default sort by incident (oldest incident first) so that same incident stays together
                applySorting('incident_asc');
                document.getElementById('sortSelect').value = 'incident_asc';
                
            } else if (viewMode === 'specific' && selectedDate) {
                let dateFilteredData = allChronologyData.filter(data => data.dateYMD === selectedDate);
                
                if (selectedIncidentId) {
                    filteredData = dateFilteredData.filter(data => data.incidentId === selectedIncidentId);
                } else {
                    filteredData = dateFilteredData;
                }
                applySorting('timestamp_desc');
                document.getElementById('sortSelect').value = 'timestamp_desc';
            }
            
            updateRecordCount();
            displayChronology();
            updateDateDisplay();  // <-- ADDED: ensures title shows incident name after data load
        }

        // Apply sorting – with incident grouping and PIC sorting
        function applySorting(sortType) {
            if (!filteredData.length) return;
            
            // Precompute group timestamps for incident‑based sorts
            let minMap, maxMap;
            if (sortType === 'incident_asc' || sortType === 'incident_desc') {
                minMap = {};
                maxMap = {};
                filteredData.forEach(item => {
                    const id = item.incidentId;
                    const ts = item.timestampValue || 0;
                    if (minMap[id] === undefined || ts < minMap[id]) minMap[id] = ts;
                    if (maxMap[id] === undefined || ts > maxMap[id]) maxMap[id] = ts;
                });
            }
            
            filteredData.sort((a, b) => {
                switch(sortType) {
                    case 'timestamp_desc': // Newest First
                        return (b.timestampValue || 0) - (a.timestampValue || 0);
                    case 'timestamp_asc': // Oldest First
                        return (a.timestampValue || 0) - (b.timestampValue || 0);
                        
                    case 'incident_asc':  // oldest incident group first
                        {
                            const minA = minMap[a.incidentId] || 0;
                            const minB = minMap[b.incidentId] || 0;
                            if (minA !== minB) return minA - minB;
                            // same incident: newest first
                            return (b.timestampValue || 0) - (a.timestampValue || 0);
                        }
                    case 'incident_desc': // newest incident group first
                        {
                            const maxA = maxMap[a.incidentId] || 0;
                            const maxB = maxMap[b.incidentId] || 0;
                            if (maxA !== maxB) return maxB - maxA;
                            // same incident: newest first
                            return (b.timestampValue || 0) - (a.timestampValue || 0);
                        }
                        
                    case 'pic_asc':
                        return (a.pic || '').localeCompare(b.pic || '');
                    case 'pic_desc':
                        return (b.pic || '').localeCompare(a.pic || '');
                    default:
                        return (b.timestampValue || 0) - (a.timestampValue || 0);
                }
            });
        }

        // Apply search filter
        function applySearchFilter() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!searchTerm) return filteredData;
            
            return filteredData.filter(data => 
                (data.info && data.info.toLowerCase().includes(searchTerm)) ||
                (data.pic && data.pic.toLowerCase().includes(searchTerm)) ||
                (data.incidentName && data.incidentName.toLowerCase().includes(searchTerm))
            );
        }

        // Helper to get badge class for category
        function getCategoryBadge(cat) {
            const map = {
                'people': 'badge-people',
                'environment': 'badge-environment',
                'asset': 'badge-asset',
                'reputation': 'badge-reputation'
            };
            return map[cat] || '';
        }

        // Helper to get PIC display value
        function getPICDisplay(picValue) {
            const picMap = {
                'swc': 'SWC',
                'wc': 'WC',
                'ff': 'FF',
                'fc': 'FC',
                'cc': 'CC',
                'planning': 'Planning',
                'logistic': 'Logistic',
                'operationchief': 'Operation Chief',
                'pic1': 'PIC 1',
                'pic2': 'PIC 2',
                'pic3': 'PIC 3',
                'pic4': 'PIC 4',
                'pic5': 'PIC 5',
                'pic6': 'PIC 6',
                'pic7': 'PIC 7'
            };
            return picMap[picValue] || picValue;
        }

        // Display chronology in table – matches admin columns (Timestamp, Info, PEAR, PIC)
        function displayChronology() {
            const tbody = document.getElementById('chronologyTableBody');
            const searchResults = applySearchFilter();
            
            if (searchResults.length === 0) {
                let message = '';
                if (viewMode === 'all') {
                    message = 'No chronology records found in the system.';
                } else if (viewMode === 'today') {
                    message = 'No chronology recorded yet for today.';
                } else if (viewMode === 'specific') {
                    if (selectedIncidentId) {
                        message = `No chronology records found for the selected incident on ${selectedDate}.`;
                    } else {
                        message = `No chronology records found for ${selectedDate}.`;
                    }
                }
                    
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="no-data">
                            <i class="fas fa-search"></i> ${message}
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = '';
            
            // If we are in "selected incident" mode, hide per‑row incident tags
            const hideIncidentDetails = (viewMode === 'specific' && selectedIncidentId);
            
            searchResults.forEach(data => {
                const row = document.createElement('tr');
                const isSelectedIncident = selectedIncidentId && data.incidentId === selectedIncidentId;
                if (isSelectedIncident) row.classList.add('highlighted');
                
                // Timestamp cell
                const timestampCell = document.createElement('td');
                timestampCell.className = 'timestamp-cell';
                
                let timestampHTML = `<div class="timestamp-main">${data.formattedDate || 'N/A'}</div>`;
                timestampHTML += `<div class="timestamp-time">${data.formattedTime || 'N/A'}</div>`;
                
                // Only show incident source if we are NOT in selected‑incident view
                if (!hideIncidentDetails && data.incidentName) {
                    timestampHTML += `<div class="incident-source">From: ${data.incidentName}</div>`;
                }
                
                timestampCell.innerHTML = timestampHTML;
                
                // Information cell
                const infoCell = document.createElement('td');
                infoCell.className = 'info-cell';
                infoCell.textContent = data.info || data.infoIncident || 'No information provided';
                
                // PEAR categories cell
                const pearCell = document.createElement('td');
                pearCell.className = 'pear-cell';
                const categories = data.pearCategories || [];
                let badgesHtml = '';
                categories.forEach(cat => {
                    const badgeClass = getCategoryBadge(cat);
                    const catDisplay = cat.charAt(0).toUpperCase() + cat.slice(1);
                    badgesHtml += `<span class="pear-badge ${badgeClass}"><span class="status-circle"></span>${catDisplay}</span> `;
                });
                pearCell.innerHTML = badgesHtml || '<span style="color:#999;">—</span>';
                
                // PIC cell
                const picCell = document.createElement('td');
                picCell.className = 'info-cell';
                const picValue = data.pic || '';
                const picDisplay = getPICDisplay(picValue);
                picCell.innerHTML = picDisplay ? `<span class="pic-badge">${picDisplay}</span>` : '—';
                
                row.appendChild(timestampCell);
                row.appendChild(infoCell);
                row.appendChild(pearCell);
                row.appendChild(picCell);
                
                tbody.appendChild(row);
            });
        }

        // Auto-scroll to the selected incident
        function scrollToSelectedIncident() {
            if (selectedIncidentId && viewMode === 'specific') {
                const highlightedRow = document.querySelector('tr.highlighted');
                if (highlightedRow) {
                    highlightedRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // Update record count
        function updateRecordCount() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const searchResults = searchTerm ? applySearchFilter() : filteredData;
            
            let countText = '';
            if (viewMode === 'all') {
                countText = `${searchResults.length} of ${allChronologyData.length} total records`;
            } else if (viewMode === 'today') {
                const todayYMD = formatDateToYMD(new Date());
                const todayRecords = allChronologyData.filter(d => d.dateYMD === todayYMD).length;
                countText = `${searchResults.length} of ${todayRecords} today's records`;
            } else if (viewMode === 'specific') {
                const dateObj = new Date(selectedDate);
                const displayDate = formatDateDisplay(dateObj);
                const dateRecords = allChronologyData.filter(d => d.dateYMD === selectedDate).length;
                
                if (selectedIncidentId) {
                    const incidentRecords = allChronologyData.filter(d => 
                        d.dateYMD === selectedDate && d.incidentId === selectedIncidentId
                    ).length;
                    countText = `${searchResults.length} of ${incidentRecords} records for ${displayDate}`;
                } else {
                    countText = `${searchResults.length} of ${dateRecords} records for ${displayDate}`;
                }
            }
            
            document.getElementById('chronologyRecordCount').textContent = countText;
        }

        // Handle search and sort changes
        function handleSearchAndSort() {
            displayChronology();
            updateRecordCount();
        }

        // Show ALL data (default view)
        function showAllData() {
            viewMode = 'all';
            selectedDate = null;
            selectedIncidentId = null;
            isShowingSpecificDate = false;
            
            localStorage.removeItem('selectedDate');
            localStorage.removeItem('selectedIncidentId');
            
            updateDateDisplay();
            filterDataByViewMode();
        }

        // Show today's data
        function showTodayData() {
            const today = new Date();
            selectedDate = formatDateToYMD(today);
            selectedIncidentId = null;
            isShowingSpecificDate = false;
            viewMode = 'today';
            
            localStorage.removeItem('selectedDate');
            localStorage.removeItem('selectedIncidentId');
            
            updateDateDisplay();
            filterDataByViewMode();
        }

        // Show specific date data
        function showSpecificDateData() {
            viewMode = 'specific';
            updateDateDisplay();
            filterDataByViewMode();
        }

        // Show no data error
        function showNoDataError() {
            const tbody = document.getElementById('chronologyTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="no-data error">
                        <i class="fas fa-exclamation-triangle"></i> Error loading chronology records
                    </td>
                </tr>
            `;
        }

        // Function to refresh chronology
        function refreshChronology() {
            const btn = document.querySelector('.refresh-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            loadAllChronologyData().then(() => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            });
        }

        // Go to home
        function goToHome() {
            localStorage.removeItem('selectedDate');
            localStorage.removeItem('selectedIncidentId');
            window.location.href = 'index.html';
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            checkForSpecificDate();
            updateDateDisplay();
            loadAllChronologyData();
            
            document.getElementById('searchInput').addEventListener('input', handleSearchAndSort);
            document.getElementById('sortSelect').addEventListener('change', function() {
                applySorting(this.value);
                displayChronology();
                updateRecordCount();
            });
            
            setInterval(() => {
                refreshChronology();
            }, 30000);
        });
    </script>
</body>
